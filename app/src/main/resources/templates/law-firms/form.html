<div xmlns:th="http://www.thymeleaf.org" th:fragment="lawFirmForm(actionUrl, submitText)">
<form th:action="${actionUrl}" th:object="${lawFirm}" method="post">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card-soft p-4">
                <h5 class="fw-bold mb-4">Στοιχεία Γραφείου</h5>
                <div class="mb-3"><label class="form-label required">Επωνυμία Γραφείου</label><input th:field="*{name}" class="form-control" placeholder="π.χ. Δικηγορικό Γραφείο Παπαδοπούλου"></div>
                <div class="mb-3"><label class="form-label required">Διακριτικός Τίτλος</label><input th:field="*{displayName}" class="form-control"></div>
                <div class="row g-3"><div class="col-md-6"><label class="form-label required">Email</label><input th:field="*{email}" type="email" class="form-control"></div><div class="col-md-6"><label class="form-label required">Τηλέφωνο</label><input th:field="*{phone}" class="form-control"></div></div>
                <div class="row g-3 mt-1"><div class="col-md-6"><label class="form-label required">ΑΦΜ</label><input th:field="*{taxNumber}" class="form-control"></div><div class="col-md-6"><label class="form-label required">ΔΟΥ</label><input th:field="*{taxOffice}" class="form-control"></div></div>
                <div class="mb-3 mt-3"><label class="form-label required">Διεύθυνση</label><input th:field="*{address}" class="form-control"></div>
                <div class="row g-3"><div class="col-md-4"><label class="form-label required">Χώρα</label><input th:field="*{country}" class="form-control"></div><div class="col-md-4"><label class="form-label required">Πόλη</label><input th:field="*{city}" class="form-control"></div><div class="col-md-4"><label class="form-label required">ΤΚ</label><input th:field="*{postalCode}" class="form-control"></div></div>
                <div class="mt-3"><label class="form-label">Σχόλια</label><textarea th:field="*{notes}" class="form-control" rows="4"></textarea></div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card-soft p-4">
                <h5 class="fw-bold mb-4">Ρυθμίσεις Συστήματος</h5>
                <div class="mb-3"><label class="form-label required">Σχέδιο Συνδρομής</label><select th:field="*{plan}" class="form-select"><option value="Basic">Basic - €120/μήνα</option><option value="Pro">Pro - €180/μήνα</option><option value="Premium">Premium - €250/μήνα</option></select></div>
                <div class="mb-3"><label class="form-label required">Ημερομηνία Έναρξης</label><input th:field="*{subscriptionStartsAt}" type="date" class="form-control"></div>
                <div class="mb-3"><label class="form-label required">Περίοδος Χρέωσης</label><select th:field="*{billingPeriod}" class="form-select"><option value="MONTHLY">Μηνιαία</option><option value="YEARLY">Ετήσια</option></select></div>
                <div class="mb-3"><label class="form-label required">Κατάσταση</label><select th:field="*{status}" class="form-select"><option value="ACTIVE">Ενεργό</option><option value="PAUSED">Σε αναστολή</option><option value="INACTIVE">Ανενεργό</option></select></div>
                <div class="form-check form-switch"><input th:field="*{sendWelcomeEmail}" class="form-check-input" type="checkbox"><label class="form-check-label">Αποστολή email πρόσκλησης</label></div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4"><a th:href="@{/admin/law-firms}" class="btn btn-light border">Ακύρωση</a><button class="btn btn-primary" type="submit" th:text="${submitText}">Αποθήκευση</button></div>
        </div>
    </div>
</form>
</div>
