<!DOCTYPE html>
<html lang="el" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | System Admin'">System Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css" rel="stylesheet">
    <link th:href="@{/admin/css/admin.css}" rel="stylesheet">
</head>
<body>
<div th:fragment="shell(active, content)">
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
                <span>System Admin</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">Επισκόπηση</div>
                <a th:href="@{/admin/dashboard}" th:classappend="${active == 'dashboard'} ? 'active'" class="nav-link">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>

                <div class="nav-section">Διαχείριση</div>
                <a th:href="@{/admin/law-firms}" th:classappend="${active == 'law-firms'} ? 'active'" class="nav-link">
                    <i class="bi bi-building"></i> Δικηγορικά Γραφεία
                </a>
                <a th:href="@{/admin/subscriptions}" th:classappend="${active == 'subscriptions'} ? 'active'" class="nav-link">
                    <i class="bi bi-repeat"></i> Συνδρομές
                </a>
                <a th:href="@{/admin/payments}" th:classappend="${active == 'payments'} ? 'active'" class="nav-link">
                    <i class="bi bi-credit-card"></i> Πληρωμές
                </a>
                <a th:href="@{/admin/plans}" th:classappend="${active == 'plans'} ? 'active'" class="nav-link">
                    <i class="bi bi-tags"></i> Σχέδια Συνδρομών
                </a>
                <a href="#" class="nav-link"><i class="bi bi-people"></i> Χρήστες Admin</a>
                <a href="#" class="nav-link"><i class="bi bi-gear"></i> Ρυθμίσεις</a>
                <a href="#" class="nav-link"><i class="bi bi-activity"></i> Logs</a>
            </nav>

            <div class="sidebar-user">
                <div class="avatar">SA</div>
                <div>
                    <strong>System Admin</strong>
                    <small>Owner</small>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div th:replace="${content}"></div>
        </main>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>
    <script th:src="@{/admin/js/admin.js}"></script>
</div>
</body>
</html>
