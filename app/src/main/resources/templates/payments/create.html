<!DOCTYPE html><html lang="el" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/layout :: head('Νέα Πληρωμή')}"></head><body><div th:replace="~{fragments/layout :: shell('payments', ~{::content})}"><div th:fragment="content"><div class="page-header"><div class="page-title"><h1>Πληρωμή από πελάτη</h1><p>Καταχώρηση νέας πληρωμής</p></div></div><form th:action="@{/admin/payments}" th:object="${payment}" method="post"><div class="row g-4"><div class="col-lg-7"><div class="card-soft p-4"><h5 class="fw-bold mb-4">Στοιχεία Πληρωμής</h5><div class="mb-3"><label class="form-label required">Γραφείο</label><select th:field="*{lawFirmId}" class="form-select"><option value="1">Δικηγορικό Γραφείο Παπαδοπούλου</option></select></div><div class="mb-3"><label class="form-label required">Ποσό</label><div class="input-group"><input th:field="*{amount}" class="form-control"><span class="input-group-text">€</span></div></div><div class="mb-3"><label class="form-label required">Μέθοδος Πληρωμής</label><select th:field="*{method}" class="form-select"><option value="CARD">Πιστωτική Κάρτα</option><option value="BANK">Τραπεζική Κατάθεση</option><option value="PAYPAL">PayPal</option></select></div><div class="mb-3"><label class="form-label required">Ημερομηνία Πληρωμής</label><input th:field="*{date}" type="date" class="form-control"></div><div class="mb-3"><label class="form-label required">Περίοδος</label><input th:field="*{period}" class="form-control" placeholder="Μάιος 2024"></div><div><label class="form-label">Σχόλια</label><textarea th:field="*{notes}" class="form-control" rows="3"></textarea></div></div><div class="d-flex justify-content-end gap-2 mt-4"><a th:href="@{/admin/payments}" class="btn btn-light border">Ακύρωση</a><button class="btn btn-primary">Καταχώρηση Πληρωμής</button></div></div><div class="col-lg-5"><div class="card-soft p-4"><h5 class="fw-bold">Σύνοψη</h5><p class="text-muted-soft mb-0">Μετά την καταχώρηση μπορείς να δημιουργήσεις απόδειξη, να ενημερώσεις τη συνδρομή ή να στείλεις email επιβεβαίωσης.</p></div></div></div></form></div></div><div th:replace="~{fragments/layout :: scripts}"></div></body></html>
